<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Avatar Demo</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f0f0f0;
      }

      .avatar {
        width: 300px;
        height: 500px;
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="avatar">
      <img src="https://i.imgur.com/6Y7X3Qy.png" />
    </div>
  </body>
</html>
